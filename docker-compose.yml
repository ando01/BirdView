# Usage:
#   Run ./setup.sh first — it auto-detects your network interface and writes .env
#
#   Static IP:  docker compose --profile static up -d
#   DHCP:       docker compose --profile dhcp up -d
#
# Variables are read from .env (generated by setup.sh):
#   PARENT_IFACE  - host network interface (e.g. ens18, eth0, enp3s0)
#   STATIC_IP     - IP to assign the container (static profile only)
#   LAN_SUBNET    - your LAN subnet (e.g. 192.168.1.0/24)
#   LAN_GATEWAY   - your router IP (e.g. 192.168.1.1)
#   TZ            - timezone (e.g. America/New_York)

x-birdfeeder: &birdfeeder-base
  image: ghcr.io/ando01/birdview:latest
  container_name: birdfeeder
  restart: unless-stopped
  volumes:
    - ./config:/config
    - ./data:/data
    - ./media:/media        # Local storage (works out of the box)
  devices:
    - /dev/bus/usb:/dev/bus/usb    # USB Coral TPU passthrough — remove if no Coral
  environment:
    - TZ=${TZ:-America/New_York}

services:

  # --- Static IP ---
  # Container always gets the same IP you choose.
  birdfeeder-static:
    <<: *birdfeeder-base
    profiles: [static]
    networks:
      lan_static:
        ipv4_address: ${STATIC_IP}

  # --- DHCP ---
  # Container requests an IP from your router's DHCP server on each start.
  birdfeeder-dhcp:
    <<: *birdfeeder-base
    profiles: [dhcp]
    networks:
      - lan_dhcp

networks:

  # macvlan network with static IPAM (used by the static profile)
  lan_static:
    driver: macvlan
    driver_opts:
      parent: ${PARENT_IFACE}
    ipam:
      config:
        - subnet: ${LAN_SUBNET}
          gateway: ${LAN_GATEWAY}

  # macvlan network without IPAM — lets the LAN DHCP server assign the IP
  lan_dhcp:
    driver: macvlan
    driver_opts:
      parent: ${PARENT_IFACE}

# --- Optional: NAS storage ---
# To store media on a NAS instead of locally, replace ./media:/media above with:
#     - nas_media:/media
# Then uncomment the volumes section below and fill in your NAS details.
#
# volumes:
#   nas_media:
#     driver: local
#     driver_opts:
#       type: cifs
#       device: "//NAS_IP/birdfeeder"
#       o: "addr=NAS_IP,username=USER,password=PASS,vers=3.0,uid=1000,gid=1000"
