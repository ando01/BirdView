# BirdFeeder — edit the values marked EDIT below, then:
#
#   Static IP:  docker compose --profile static up -d
#   DHCP:       docker compose --profile dhcp up -d
#
# To find your host's network interface:  ip route show default
# To find your LAN subnet/gateway:        ip route show default

x-birdfeeder: &birdfeeder-base
  image: ghcr.io/ando01/birdview:latest
  container_name: birdfeeder
  restart: unless-stopped
  volumes:
    - ./config:/config
    - ./data:/data
    - ./media:/media
  devices:
    - /dev/bus/usb:/dev/bus/usb    # USB Coral TPU — remove this line if you don't have one
  environment:
    - TZ=America/New_York          # EDIT: your timezone

services:

  birdfeeder-static:
    <<: *birdfeeder-base
    profiles: [static]
    networks:
      lan_static:
        ipv4_address: 192.168.1.100  # EDIT: desired IP for this container

  birdfeeder-dhcp:
    <<: *birdfeeder-base
    profiles: [dhcp]
    networks:
      - lan_dhcp

networks:

  lan_static:
    driver: macvlan
    driver_opts:
      parent: eth0               # EDIT: your host's network interface (ens18, enp3s0, etc.)
    ipam:
      config:
        - subnet: 192.168.1.0/24 # EDIT: your LAN subnet
          gateway: 192.168.1.1   # EDIT: your router IP

  lan_dhcp:
    driver: macvlan
    driver_opts:
      parent: eth0               # EDIT: same interface as above

# --- Optional: NAS storage ---
# To store media on a NAS instead of locally, replace ./media:/media above with:
#     - nas_media:/media
# Then uncomment the volumes section below and fill in your NAS details.
#
# volumes:
#   nas_media:
#     driver: local
#     driver_opts:
#       type: cifs
#       device: "//NAS_IP/birdfeeder"
#       o: "addr=NAS_IP,username=USER,password=PASS,vers=3.0,uid=1000,gid=1000"
